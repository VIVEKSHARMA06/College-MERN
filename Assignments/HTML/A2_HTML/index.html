<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>FORMS</h1>
    <form action="">
        <label for="name">Name : </label>
        <input type="text" id="name" placeholder="Name">
        <br><br>
        <label for="email">Email : </label>
        <input type="email" id="email" placeholder="E-mail">
        <br><br>
        <label for="pass">Password : </label>
        <input type="password" name="pass" id="pass" placeholder="Password">
        <br><br><br>
        Language
        <br>
        <input type="radio" name="lang" id="html">
        <label for="html">HTML</label>
        <br>
        <input type="radio" name="lang" id="css">
        <label for="css">CSS</label>
        <br>
        <input type="radio" name="lang" id="js">
        <label for="js">JS</label>
        <br><br><br>
        Course
        <br>
        <input type="checkbox" name="course" id="javastack">
        <label for="javastack">Java Stack</label>
        <br>
        <input type="checkbox" name="course" id="ds">
        <label for="ds">Data Science</label>
        <br>
        <input type="checkbox" name="course" id="MERN">
        <label for="MERN">MERN</label>
        <br><br><br>
        <label for="field">Field : </label>
        <select name="field" id="field">
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JS">JS</option>
        </select>
        <br><br><br>
        <textarea name="desc" id="desc" placeholder="Describe yourself"></textarea>
        <br><br>
        <label for="date">Date : </label>
        <input type="date" id="date">
        <br><br>
        <label for="phone">Phone No.</label>
        <input type="text" placeholder="Phone N." id="phone">
        <br><br>
        <input type="submit">
        <br><br>
        <a href="tables.html">Click here for table file</a>
    </form>
</body>
</html>
